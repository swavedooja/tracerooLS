<div class="material-list-container">
  <div class="list-header">
    <h1 class="page-title">Materials</h1>
    <button mat-flat-button color="primary" (click)="navigateToNew()">
      <mat-icon>add</mat-icon> New Material
    </button>
  </div>

  <mat-card class="search-card">
    <mat-form-field appearance="standard" class="full-width">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [(ngModel)]="search" placeholder="Search by name or code...">
    </mat-form-field>
  </mat-card>

  <div class="table-wrapper mat-elevation-z1">
    <table mat-table [dataSource]="filteredMaterials" class="full-width">
      
      <!-- SKU Column -->
      <ng-container matColumnDef="sku">
        <th mat-header-cell *matHeaderCellDef> SKU </th>
        <td mat-cell *matCellDef="let row">
          <div class="sku-cell">
            <span class="code">{{row.code}}</span>
            <span class="name">{{row.name}}</span>
          </div>
        </td>
      </ng-container>

      <!-- Type Column -->
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef> Type </th>
        <td mat-cell *matCellDef="let row">
          <mat-chip-set>
            <mat-chip disableRipple class="type-chip">FINISHED_GOODS</mat-chip>
          </mat-chip-set>
        </td>
      </ng-container>

      <!-- Group Column -->
      <ng-container matColumnDef="group">
        <th mat-header-cell *matHeaderCellDef> Group </th>
        <td mat-cell *matCellDef="let row"> {{row.category?.replace('_', ' ') || 'General'}} </td>
      </ng-container>

      <!-- UOM Column -->
      <ng-container matColumnDef="uom">
        <th mat-header-cell *matHeaderCellDef> UOM </th>
        <td mat-cell *matCellDef="let row"> {{row.baseUom}} </td>
      </ng-container>

      <!-- Track & Trace Column -->
      <ng-container matColumnDef="trackTrace">
        <th mat-header-cell *matHeaderCellDef> Track & Trace </th>
        <td mat-cell *matCellDef="let row">
          <mat-chip-set>
            <mat-chip *ngIf="row.isBatchManaged" color="primary" class="mini-chip">Batch</mat-chip>
            <mat-chip *ngIf="row.isSerialManaged" color="accent" class="mini-chip">Serial</mat-chip>
          </mat-chip-set>
        </td>
      </ng-container>

      <!-- Weight Column -->
      <ng-container matColumnDef="weight">
        <th mat-header-cell *matHeaderCellDef> Weight </th>
        <td mat-cell *matCellDef="let row"> {{row.netWeight ? row.netWeight + ' ' + (row.weightUom || '') : '-'}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-right"> Actions </th>
        <td mat-cell *matCellDef="let row" class="text-right">
          <button mat-icon-button color="info" (click)="onView(row, viewDialog)" title="Quick View">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="primary" (click)="navigateToEdit(row.code)" title="Edit Material">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="onDelete(row.code)" title="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>

<!-- View Material Dialog Template -->
<ng-template #viewDialog>
  <div class="dialog-header">
    <h2 mat-dialog-title>Material Insight</h2>
    <button mat-icon-button (click)="dialog.closeAll()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
  <mat-dialog-content class="no-padding">
    <app-material-detail-card [material]="viewMaterial" [images]="viewMaterial?.images || []"></app-material-detail-card>
  </mat-dialog-content>
  <mat-dialog-actions align="center" class="dialog-footer">
    <button mat-flat-button color="primary" (click)="navigateToDetails(viewMaterial.code)" class="view-more-btn">
      View More Details
    </button>
  </mat-dialog-actions>
</ng-template>
