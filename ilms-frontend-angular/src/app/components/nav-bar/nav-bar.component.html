<!-- AppBar -->
<mat-toolbar color="primary" class="app-bar mat-elevation-z4">
  <button mat-icon-button (click)="toggleDrawer()">
    <mat-icon>menu</mat-icon>
  </button>

  <a routerLink="/" class="logo-link">
    <div class="logo-box">
      <mat-icon class="icon">local_shipping</mat-icon>
    </div>
    <span class="app-title">SLS Material Management</span>
  </a>

  <span class="spacer"></span>

  <button mat-icon-button class="notifications-btn">
    <mat-icon matBadge="3" matBadgeColor="warn">notifications</mat-icon>
  </button>
  <button mat-icon-button (click)="onLogout()">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<!-- Side Drawer -->
<mat-sidenav-container class="sidenav-container" [hasBackdrop]="true" *ngIf="isDrawerOpen">
  <mat-sidenav [opened]="isDrawerOpen" (openedChange)="isDrawerOpen = $event" mode="over" fixedInViewport="true">
    <div class="drawer-header">
      <h3>Menu</h3>
    </div>
    <mat-nav-list>
      <a mat-list-item *ngFor="let item of menuItems" [routerLink]="item.path" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" (click)="toggleDrawer()">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <div matListItemTitle>{{ item.label }}</div>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content></mat-sidenav-content>
</mat-sidenav-container>
